<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Submit A Constraint | AI Systems Lab</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#030712;
color:#E5E7EB;
display:flex;
align-items:center;
min-height:100vh;
flex-direction:column;
padding:40px 20px;
}

/* Analyzer Terminal */
#terminal{
font-family:monospace;
font-size:16px;
color:#38BDF8;
background:#000;
border:1px solid rgba(56,189,248,0.3);
padding:30px;
border-radius:12px;
width:100%;
max-width:900px;
box-shadow:0 0 20px rgba(56,189,248,0.2);
margin-top: 20px;
}

.line{
margin:8px 0;
opacity:0;
animation:fadeIn 0.6s forwards;
}

@keyframes fadeIn{
to{opacity:1;}
}

/* Form Container */
#form-container{
display:none; 
width:100%;
max-width:900px;
background:rgba(0,255,255,0.03);
border:1px solid rgba(0,255,255,0.15);
padding:35px;
border-radius:16px;
backdrop-filter:blur(20px);
margin-top:30px;
opacity: 0;
}

.show-form {
display: block !important;
animation: formSlideUp 0.8s ease-out forwards;
}

@keyframes formSlideUp {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}

h1{
color:#38BDF8;
margin-bottom:10px;
}

p{
color:#9CA3AF;
margin-bottom:30px;
}

label{
display:block;
margin-top:20px;
margin-bottom:5px;
color:#CBD5E1;
transition: 0.3s;
}

input, textarea, select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.1);
background:#020617;
color:#E5E7EB;
transition: 0.3s;
}

textarea{
min-height:120px;
}

button{
margin-top:30px;
padding:14px 28px;
width:100%;
border-radius:40px;
border:1px solid #38BDF8;
color:#38BDF8;
background:rgba(0,255,255,0.08);
box-shadow:0 0 20px rgba(56,189,248,0.5);
font-weight:600;
font-size: 16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#38BDF8;
color:#030712;
transform:scale(1.02);
box-shadow:0 0 25px rgba(56,189,248,0.8);
}

.back{
display:inline-block;
margin-top:40px;
color:#38BDF8;
text-decoration:none;
transition: 0.2s;
}

.back:hover {
color: #fff;
}

/* Helper to hide fields smoothly */
.hidden-field {
display: none;
}

</style>
</head>

<body>

<div id="terminal"></div>

<div id="form-container">

<h1>Submit Request</h1>

<p id="form-description">
Select what you are looking for below. AI Systems Lab will review the request and get back to you.
</p>

<form action="https://formsubmit.co/ankushguptagfi@gmail.com" method="POST">

<label>Your Name</label>
<input type="text" name="name" required>

<label>Email Address</label>
<input type="email" name="email" required>

<label id="type-label">What are you looking for?</label>
<select name="project_type" id="project_type" required onchange="adaptForm()">
<option value="">Select</option>
<option style="font-weight: bold; color: #38BDF8;">Rent Trading Bot (10% Commission)</option>
<option>Build a Mobile App</option>
<option>Build a Website</option>
<option>Build an Automation System</option>
<option>Build an AI Tool</option>
<option>Something Else</option>
</select>

<label id="problem-label">Describe the problem</label>
<textarea name="problem_description" id="problem_textarea" required></textarea>

<label id="features-label">What features should the system have?</label>
<textarea name="features" id="features_textarea"></textarea>

<div id="platform-group">
<label>What platform should it run on?</label>
<select name="platform">
<option>Android</option>
<option>iOS</option>
<option>Website</option>
<option>Desktop</option>
<option>Not Sure</option>
</select>
</div>

<div id="timeline-group">
<label>Estimated timeline (optional)</label>
<input type="text" name="timeline">
</div>

<label>Additional details</label>
<textarea name="details"></textarea>

<input type="hidden" name="_captcha" value="false">

<button type="submit" id="submit-btn">Transmit Request</button>

</form>

<a class="back" href="index.html">← Return to AI Systems Lab</a>

</div>

<script>
// --- Terminal Animation ---
const lines = [
"> Incoming Request Detected...",
"> Initializing Interface...",
"> Scanning Parameters...",
"> Establishing Secure Connection...",
"> Ready for Input."
]

const terminal = document.getElementById("terminal")

lines.forEach((text,index)=>{
    setTimeout(()=>{
        let div = document.createElement("div")
        div.className = "line"
        div.textContent = text
        terminal.appendChild(div)
    }, index * 800)
})

setTimeout(()=>{
    document.getElementById("form-container").classList.add("show-form")
}, lines.length * 800 + 600)

// --- Smart Form Logic ---
function adaptForm() {
    const type = document.getElementById("project_type").value;
    
    const problemLabel = document.getElementById("problem-label");
    const problemTextarea = document.getElementById("problem_textarea");
    
    const featuresLabel = document.getElementById("features-label");
    const featuresTextarea = document.getElementById("features_textarea");
    
    const platformGroup = document.getElementById("platform-group");
    const timelineGroup = document.getElementById("timeline-group");
    const submitBtn = document.getElementById("submit-btn");

    if (type === "Rent Trading Bot (10% Commission)") {
        // Change text for trading bot customers
        problemLabel.innerText = "Which bot are you interested in?";
        problemTextarea.placeholder = "e.g., The Alpaca US Markets Bot, or KAREN for Kraken...";
        
        featuresLabel.innerText = "What is your current trading experience level?";
        featuresTextarea.placeholder = "Briefly describe if you have traded stocks/crypto before...";
        
        // Hide developer specific fields
        platformGroup.classList.add("hidden-field");
        timelineGroup.classList.add("hidden-field");
        
        submitBtn.innerText = "Request Bot Access";
    } else {
        // Reset to standard constraint form
        problemLabel.innerText = "Describe the problem";
        problemTextarea.placeholder = "";
        
        featuresLabel.innerText = "What features should the system have?";
        featuresTextarea.placeholder = "";
        
        // Show developer specific fields
        platformGroup.classList.remove("hidden-field");
        timelineGroup.classList.remove("hidden-field");
        
        submitBtn.innerText = "Transmit Constraint";
    }
}
</script>

</body>
</html>
