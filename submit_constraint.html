<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Constraint Analyzer | AI Systems Lab</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#020617;
color:#E5E7EB;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
flex-direction:column;
overflow:hidden;
}

/* analyzer terminal */

#terminal{
font-family:monospace;
font-size:16px;
color:#38BDF8;
background:#000;
border:1px solid rgba(56,189,248,0.3);
padding:30px;
border-radius:12px;
width:420px;
max-width:90%;
box-shadow:0 0 20px rgba(56,189,248,0.2);
}

.line{
margin:8px 0;
opacity:0;
animation:fadeIn 0.6s forwards;
}

@keyframes fadeIn{
to{opacity:1;}
}

/* form */

#form-container{
display:none;
margin-top:30px;
width:420px;
max-width:90%;
background:rgba(255,255,255,0.02);
border:1px solid rgba(56,189,248,0.2);
padding:30px;
border-radius:12px;
backdrop-filter:blur(10px);
}

input,textarea{

width:100%;
padding:12px;
margin-top:10px;
margin-bottom:20px;

background:#020617;

border:1px solid rgba(56,189,248,0.2);

border-radius:8px;

color:#E5E7EB;
}

button{

width:100%;
padding:14px;

border:none;

border-radius:30px;

background:#38BDF8;

color:#020617;

font-weight:600;

cursor:pointer;

transition:0.3s;
}

button:hover{

transform:scale(1.05);

box-shadow:0 0 15px rgba(56,189,248,0.6);

}

h2{
margin-bottom:10px;
color:#38BDF8;
}

</style>
</head>

<body>

<div id="terminal"></div>

<div id="form-container">

<h2>Submit A Constraint</h2>

<form action="https://formspree.io/f/xzzgpdke" method="POST">

<label>Your Name</label>
<input type="text" name="name" required>

<label>Describe The Problem</label>
<textarea name="problem" rows="5" required></textarea>

<label>Email (optional)</label>
<input type="email" name="email">

<button type="submit">Transmit Constraint</button>

</form>

</div>

<script>

const lines = [

"> Incoming Constraint Detected...",
"> Initializing Analyzer...",
"> Scanning Parameters...",
"> Evaluating Feasibility...",
"> Preparing Submission Interface..."

]

const terminal = document.getElementById("terminal")

lines.forEach((text,index)=>{

setTimeout(()=>{

let div=document.createElement("div")
div.className="line"
div.textContent=text

terminal.appendChild(div)

},index*900)

})

setTimeout(()=>{

document.getElementById("form-container").style.display="block"

}, lines.length * 900 + 800)

</script>

</body>
</html>
