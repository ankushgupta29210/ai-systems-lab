<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Submit A Constraint | AI Systems Lab</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#030712;
color:#E5E7EB;
display:flex;
align-items:center;
/* Changed from height:100vh to min-height to allow scrolling for the long form */
min-height:100vh;
flex-direction:column;
padding:40px 20px;
}

/* Analyzer Terminal */
#terminal{
font-family:monospace;
font-size:16px;
color:#38BDF8;
background:#000;
border:1px solid rgba(56,189,248,0.3);
padding:30px;
border-radius:12px;
width:100%;
max-width:900px;
box-shadow:0 0 20px rgba(56,189,248,0.2);
margin-top: 20px;
}

.line{
margin:8px 0;
opacity:0;
animation:fadeIn 0.6s forwards;
}

@keyframes fadeIn{
to{opacity:1;}
}

/* Form Container */
#form-container{
display:none; /* Hidden initially, revealed by JS */
width:100%;
max-width:900px;
background:rgba(0,255,255,0.03);
border:1px solid rgba(0,255,255,0.15);
padding:35px;
border-radius:16px;
backdrop-filter:blur(20px);
margin-top:30px;
opacity: 0;
}

/* Smooth entry for the form */
.show-form {
display: block !important;
animation: formSlideUp 0.8s ease-out forwards;
}

@keyframes formSlideUp {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}

h1{
color:#38BDF8;
margin-bottom:10px;
}

p{
color:#9CA3AF;
margin-bottom:30px;
}

label{
display:block;
margin-top:20px;
margin-bottom:5px;
color:#CBD5E1;
}

input, textarea, select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.1);
background:#020617;
color:#E5E7EB;
}

textarea{
min-height:120px;
}

button{
margin-top:30px;
padding:14px 28px;
width:100%;
border-radius:40px;
border:1px solid #38BDF8;
color:#38BDF8;
background:rgba(0,255,255,0.08);
box-shadow:0 0 20px rgba(56,189,248,0.5);
font-weight:600;
font-size: 16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#38BDF8;
color:#030712;
transform:scale(1.02);
box-shadow:0 0 25px rgba(56,189,248,0.8);
}

.back{
display:inline-block;
margin-top:40px;
color:#38BDF8;
text-decoration:none;
transition: 0.2s;
}

.back:hover {
color: #fff;
}

</style>
</head>

<body>

<div id="terminal"></div>

<div id="form-container">

<h1>Submit A Constraint</h1>

<p>
If you're facing a real-world bottleneck and believe software could solve it,
describe the problem below.  
AI Systems Lab will review the request and explore building a solution.
</p>

<form action="https://formsubmit.co/ankushguptagfi@gmail.com" method="POST">

<label>Your Name</label>
<input type="text" name="name" required>

<label>Email Address</label>
<input type="email" name="email" required>

<label>What do you need built?</label>
<select name="project_type" required>
<option value="">Select</option>
<option>Mobile App</option>
<option>Website</option>
<option>Automation System</option>
<option>AI Tool</option>
<option>Something Else</option>
</select>

<label>Describe the problem</label>
<textarea name="problem_description" required></textarea>

<label>What features should the system have?</label>
<textarea name="features"></textarea>

<label>What platform should it run on?</label>
<select name="platform">
<option>Android</option>
<option>iOS</option>
<option>Website</option>
<option>Desktop</option>
<option>Not Sure</option>
</select>

<label>Estimated timeline (optional)</label>
<input type="text" name="timeline">

<label>Additional details</label>
<textarea name="details"></textarea>

<input type="hidden" name="_captcha" value="false">

<button type="submit">Transmit Constraint</button>

</form>

<a class="back" href="index.html">← Return to AI Systems Lab</a>

</div>

<script>

const lines = [
"> Incoming Constraint Detected...",
"> Initializing Analyzer...",
"> Scanning Parameters...",
"> Evaluating Feasibility...",
"> Preparing Submission Interface..."
]

const terminal = document.getElementById("terminal")

lines.forEach((text,index)=>{
    setTimeout(()=>{
        let div = document.createElement("div")
        div.className = "line"
        div.textContent = text
        terminal.appendChild(div)
    }, index * 900)
})

// Trigger the form to appear with a smooth animation after the terminal text finishes
setTimeout(()=>{
    document.getElementById("form-container").classList.add("show-form")
}, lines.length * 900 + 800)

</script>

</body>
</html>
