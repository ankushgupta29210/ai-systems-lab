<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Transmission Received</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#030712;
color:#E5E7EB;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
padding:20px;
}

.card{
background:rgba(0,255,255,0.03);
border:1px solid rgba(0,255,255,0.15);
padding:40px;
border-radius:18px;
text-align:center;
max-width:500px;
backdrop-filter:blur(20px);
}

h1{
color:#38BDF8;
margin-bottom:10px;
}

p{
color:#9CA3AF;
margin-bottom:30px;
}

.btn{
display:inline-block;
padding:12px 30px;
border-radius:40px;
border:1px solid #38BDF8;
color:#38BDF8;
text-decoration:none;
background:rgba(0,255,255,0.08);
box-shadow:0 0 20px rgba(56,189,248,0.5);
font-weight:600;
transition:0.3s;
}

.btn:hover{
background:#38BDF8;
color:#030712;
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="card">

<h1>Transmission Received</h1>

<p>
Your constraint has been successfully submitted to AI Systems Lab.  
Our system will analyze the request and you will be contacted if a solution is feasible.
</p>

<a class="btn" href="index.html">Return to AI Systems Lab</a>
